<style>
:root {
  --purple: #7b2cbf;
  --purple-dark: #5a189a;
  --bg: #121212;
  --text: #ffffff;
  --card: #1e1e1e;
  --border: #333;
}
.light {
  --bg: #ffffff;
  --text: #000000;
  --card: #f2f2f2;
  --border: #ccc;
}
body {
  font-family: 'Roboto', sans-serif;
  margin: 0;
  background: var(--bg);
  color: var(--text);
}
header {
  padding: 16px;
  text-align: center;
  background: var(--purple-dark);
  font-size: 1.5rem;
}
.container {
  padding: 16px;
}
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}
button {
  background: var(--purple);
  border: none;
  color: white;
  padding: 8px;
  cursor: pointer;
}
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 8px;
  border-bottom: 1px solid var(--border);
}
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--purple);
  padding: 12px 18px;
  border-radius: 6px;
  opacity: 0;
  z-index: 9999;
}
.toast.show { opacity:1; }
</style>
</head>

let sortKey = '';
let asc = true;

function render(data) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML='';
  data.forEach(s=>{
    const tr=document.createElement('tr');
    tr.innerHTML = `<td><button onclick="copySong('${s.title}','${s.artist}')">Copy</button></td>
    <td>${s.title}</td><td>${s.artist}</td><td>${s.album}</td>`;
    tbody.appendChild(tr);
  });
}

function sortTable(key){
  asc = sortKey===key ? !asc : true;
  sortKey = key;
  songs.sort((a,b)=> asc ? a[key].localeCompare(b[key]) : b[key].localeCompare(a[key]));
  render(songs);
}

document.getElementById('search').addEventListener('input',e=>{
  const v=e.target.value.toLowerCase();
  render(songs.filter(s=>s.title.toLowerCase().includes(v)||s.artist.toLowerCase().includes(v)||s.album.toLowerCase().includes(v)));
});

function copySong(t,a){
  navigator.clipboard.writeText(t+" - "+a);
  const toast=document.getElementById('toast');
  toast.textContent="Song name copied! Paste it into the channel point redeem window and I'll add it into the queue.";
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),3000);
}

function toggleTheme(){
  document.body.classList.toggle('light');
}

render(songs);
