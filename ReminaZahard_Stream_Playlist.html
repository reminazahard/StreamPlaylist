<style>
:root {
  --purple:#7b2cbf;
  --purple-dark:#5a189a;
  --bg:#121212;
  --text:#ffffff;
  --card:#1e1e1e;
  --border:#333;
}
.light {
  --bg:#ffffff;
  --text:#000000;
  --card:#f2f2f2;
  --border:#ccc;
}
body {
  font-family:'Roboto',sans-serif;
  margin:0;
  background:var(--bg);
  color:var(--text);
}
header {
  padding:16px;
  text-align:center;
  background:var(--purple-dark);
  font-size:1.5rem;
  font-weight:500;
}
.container {
  padding:16px;
  max-width:1200px;
  margin:auto;
}
input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  box-sizing:border-box;
}
button {
  background:var(--purple);
  border:none;
  color:white;
  padding:8px;
  cursor:pointer;
  border-radius:6px;
}
table {
  width:100%;
  border-collapse:collapse;
  font-size:clamp(10px,2.5vw,14px);
}
th,td {
  padding:8px;
  border-bottom:1px solid var(--border);
  text-align:left;
}
th {
  cursor:pointer;
}
.toast {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:var(--purple);
  padding:12px 18px;
  border-radius:6px;
  opacity:0;
  z-index:9999;
  transition:opacity .2s;
}
.toast.show {
  opacity:1;
}
</style>
</head>

let sortKey = '';
let asc = true;

function render(data) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  data.forEach(song => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><button class="copy-btn">Copy</button></td>
      <td>${song.title}</td>
      <td>${song.artist}</td>
      <td>${song.album}</td>`;

    tr.querySelector('.copy-btn').onclick = () => {
      navigator.clipboard.writeText(`${song.title} - ${song.artist}`);
      const toast = document.getElementById('toast');
      toast.textContent = "Song name copied! Paste it into the channel point redeem window and I'll add it into the queue.";
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    };

    tbody.appendChild(tr);
  });
}

function sortTable(key) {
  asc = sortKey === key ? !asc : true;
  sortKey = key;

  currentData.sort((a,b) =>
    asc ? (a[key]||'').localeCompare(b[key]||'')
        : (b[key]||'').localeCompare(a[key]||'')
  );

  render(currentData);
}

document.getElementById('search').addEventListener('input', e => {
  const term = e.target.value.toLowerCase();

  currentData = songs.filter(song =>
    (song.title || '').toLowerCase().includes(term) ||
    (song.artist || '').toLowerCase().includes(term) ||
    (song.album || '').toLowerCase().includes(term)
  );

  render(currentData);
});

function toggleTheme() {
  document.body.classList.toggle('light');
}

render(currentData);
